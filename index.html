<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/twinpulse-logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TwinPulse — Incognito Live Sparks ❤️</title>
</head>

<body>
  <div id="root">
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #080711; font-family: 'Inter', system-ui, -apple-system, sans-serif; color: white;">
      <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 20px; animation: pulse 2s infinite ease-in-out;">
        <img src="/twinpulse-logo.png" alt="TwinPulse Logo" style="width: 56px; height: 56px; border-radius: 50%; border: 1px solid rgba(255, 42, 95, 0.3); padding: 2px; box-shadow: 0 0 20px rgba(255,42,95,0.3); object-fit: cover;" />
        <h1 style="font-size: 3.5rem; font-weight: 900; background: linear-gradient(to right, #ec4899, #f43f5e, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; letter-spacing: -0.05em;">TwinPulse</h1>
      </div>
      <div style="width: 40px; height: 2px; background: linear-gradient(to right, #ec4899, #8b5cf6); border-radius: 9999px; animation: loading-bar 1.5s infinite ease-in-out;"></div>
    </div>
    <style>
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.02); opacity: 1; filter: drop-shadow(0 0 15px rgba(255,42,95,0.25)); }
      }
      @keyframes loading-bar {
        0% { transform: scaleX(0.5); opacity: 0.3; }
        50% { transform: scaleX(1.5); opacity: 0.8; }
        100% { transform: scaleX(0.5); opacity: 0.3; }
      }
    </style>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
